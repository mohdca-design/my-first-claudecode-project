<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mood Tracker</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    min-height: 100vh;
    margin: 0;
    padding: 2rem 1rem;
    color: #2d3748;
  }
  .container {
    max-width: 480px;
    margin: 0 auto;
    background: #fff;
    border-radius: 16px;
    padding: 2rem;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
  }
  h1 {
    text-align: center;
    margin: 0 0 0.5rem;
    font-size: 1.75rem;
  }
  .subtitle {
    text-align: center;
    color: #718096;
    margin: 0 0 1.5rem;
    font-size: 0.95rem;
  }
  .moods {
    display: flex;
    justify-content: space-between;
    gap: 0.5rem;
    margin-bottom: 2rem;
  }
  .mood-btn {
    flex: 1;
    background: #f7fafc;
    border: 2px solid #e2e8f0;
    border-radius: 12px;
    padding: 0.75rem 0.25rem;
    font-size: 2rem;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s, background 0.15s;
  }
  .mood-btn:hover {
    transform: translateY(-3px);
    border-color: #667eea;
    background: #edf2f7;
  }
  .mood-btn:active { transform: translateY(0); }
  .mood-btn .label {
    display: block;
    font-size: 0.7rem;
    color: #4a5568;
    margin-top: 0.25rem;
  }
  .history-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.75rem;
  }
  .history-header h2 {
    font-size: 1.1rem;
    margin: 0;
  }
  .clear-btn {
    background: none;
    border: none;
    color: #e53e3e;
    cursor: pointer;
    font-size: 0.85rem;
  }
  .clear-btn:hover { text-decoration: underline; }
  .history {
    list-style: none;
    padding: 0;
    margin: 0;
    max-height: 320px;
    overflow-y: auto;
  }
  .history li {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.75rem;
    border-bottom: 1px solid #edf2f7;
  }
  .history li:last-child { border-bottom: none; }
  .history .emoji { font-size: 1.5rem; }
  .history .meta { flex: 1; }
  .history .mood-name {
    font-weight: 600;
    font-size: 0.95rem;
  }
  .history .time {
    font-size: 0.8rem;
    color: #718096;
  }
  .empty {
    text-align: center;
    color: #a0aec0;
    padding: 2rem 0;
    font-size: 0.9rem;
  }
</style>
</head>
<body>
  <div class="container">
    <h1>Mood Tracker</h1>
    <p class="subtitle">How are you feeling right now?</p>
    <div class="moods" id="moods">
      <button class="mood-btn" data-emoji="😄" data-name="Happy">😄<span class="label">Happy</span></button>
      <button class="mood-btn" data-emoji="🙂" data-name="Good">🙂<span class="label">Good</span></button>
      <button class="mood-btn" data-emoji="😐" data-name="Meh">😐<span class="label">Meh</span></button>
      <button class="mood-btn" data-emoji="😟" data-name="Down">😟<span class="label">Down</span></button>
      <button class="mood-btn" data-emoji="😢" data-name="Sad">😢<span class="label">Sad</span></button>
    </div>
    <div class="history-header">
      <h2>History</h2>
      <button class="clear-btn" id="clearBtn">Clear all</button>
    </div>
    <ul class="history" id="history"></ul>
  </div>

<script>
  const STORAGE_KEY = "moodTrackerEntries";
  const moodsEl = document.getElementById("moods");
  const historyEl = document.getElementById("history");
  const clearBtn = document.getElementById("clearBtn");

  function loadEntries() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    } catch {
      return [];
    }
  }

  function saveEntries(entries) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
  }

  function formatTime(iso) {
    const d = new Date(iso);
    return d.toLocaleString(undefined, {
      month: "short",
      day: "numeric",
      hour: "numeric",
      minute: "2-digit",
    });
  }

  function render() {
    const entries = loadEntries();
    if (entries.length === 0) {
      historyEl.innerHTML = '<li class="empty">No moods logged yet.</li>';
      return;
    }
    historyEl.innerHTML = entries
      .slice()
      .reverse()
      .map(
        (e) => `
        <li>
          <span class="emoji">${e.emoji}</span>
          <div class="meta">
            <div class="mood-name">${e.name}</div>
            <div class="time">${formatTime(e.time)}</div>
          </div>
        </li>`
      )
      .join("");
  }

  moodsEl.addEventListener("click", (e) => {
    const btn = e.target.closest(".mood-btn");
    if (!btn) return;
    const entries = loadEntries();
    entries.push({
      emoji: btn.dataset.emoji,
      name: btn.dataset.name,
      time: new Date().toISOString(),
    });
    saveEntries(entries);
    render();
  });

  clearBtn.addEventListener("click", () => {
    if (confirm("Clear all mood history?")) {
      saveEntries([]);
      render();
    }
  });

  render();
</script>
</body>
</html>
